name: Build Libcamera Android HAL

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build-libcamera-android:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build \
          python3-pip pkg-config \
          libprotobuf-dev protobuf-compiler

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26d

    - name: Configure build
      run: |
        cmake -B build-android -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-29 \
          -DENABLE_ANDROID=ON \
          -DENABLE_HAL=ON \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build libcamera + HAL
      run: cmake --build build-android --target libcamera_android_hal

    - name: Archive artifacts
      uses: actions/upload-artifact@v4
      with:
        name: libcamera-hal-android
        path: build-android/src/android/*.so
